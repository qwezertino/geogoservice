# ─── Shared environment for all Go replicas ───────────────────────────────────
x-app-env: &app-env
  DB_HOST: postgis
  DB_PORT: "5432"               # internal container port – never changes
  DB_USER: ${DB_USER}
  DB_PASSWORD: ${DB_PASSWORD}
  DB_NAME: ${DB_NAME}
  MINIO_ENDPOINT: minio:9000    # internal container address – never changes
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
  MINIO_BUCKET: ${MINIO_BUCKET}
  MINIO_USE_SSL: "false"
  # GDAL env vars – allow /vsicurl/ to use the network
  GDAL_HTTP_UNSAFESSL: "YES"
  CPL_VSIL_CURL_ALLOWED_EXTENSIONS: ".tif,.tiff"
  GDAL_DISABLE_READDIR_ON_OPEN: "EMPTY_DIR"
  PORT: "8080"                  # internal container port – never changes
  # STAC provider: "planetary-computer" (default) or "earth-search"
  STAC_PROVIDER: ${STAC_PROVIDER:-planetary-computer}
  # Scene search window: ±N days around the requested date (default 15)
  STAC_SEARCH_WINDOW_DAYS: ${STAC_SEARCH_WINDOW_DAYS:-15}
  # Maximum acceptable cloud cover percent 0–100 (default 20)
  STAC_MAX_CLOUD_COVER: ${STAC_MAX_CLOUD_COVER:-20}

services:
  # ── PostGIS ─────────────────────────────────────────────────────────────────
  postgis:
    image: postgis/postgis:15-3.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      # Store data in a subdirectory so .gitkeep at the mount root doesn't
      # interfere with initdb's "directory must be empty" check.
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${HOST_PORT_DB:-5432}:5432"  # change HOST_PORT_DB in .env to remap
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geouser -d geodb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO ───────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "${HOST_PORT_MINIO:-9000}:9000"          # S3 API
      - "${HOST_PORT_MINIO_CONSOLE:-9001}:9001"  # Web UI
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO bucket initializer (runs once) ────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-ndvi-tiles}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY &&
        mc mb --ignore-existing local/$$MINIO_BUCKET &&
        mc anonymous set download local/$$MINIO_BUCKET
      "
    restart: "no"

  # ── Go service (scale with: docker compose up -d --scale gogeoapp=N) ────────
  gogeoapp:
    build: ./app
    restart: unless-stopped
    environment:
      <<: *app-env
    depends_on:
      postgis:
        condition: service_healthy
      minio:
        condition: service_healthy
    expose:
      - "8080"

  # ── Nginx load balancer ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "${HOST_PORT_HTTP:-80}:80"  # change HOST_PORT_HTTP in .env to remap
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gogeoapp

# Data is persisted in ./data/ — stop/start containers freely without data loss.
