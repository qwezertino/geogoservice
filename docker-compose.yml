# ─── Shared environment for all Go replicas ───────────────────────────────────
x-app-env: &app-env
  DB_HOST: postgis
  DB_PORT: "5432"               # internal container port – never changes
  DB_USER: ${DB_USER}
  DB_PASSWORD: ${DB_PASSWORD}
  DB_NAME: ${DB_NAME}
  MINIO_ENDPOINT: minio:9000    # internal container address – never changes
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
  MINIO_BUCKET: ${MINIO_BUCKET}
  MINIO_USE_SSL: "false"
  # GDAL env vars – allow /vsicurl/ to use the network
  REDIS_URL: redis://redis:6379/0
  GDAL_HTTP_UNSAFESSL: ${GDAL_HTTP_UNSAFESSL:-YES}
  CPL_VSIL_CURL_ALLOWED_EXTENSIONS: ${CPL_VSIL_CURL_ALLOWED_EXTENSIONS:-.tif,.tiff,.jp2}
  GDAL_HTTP_MAX_RETRY: ${GDAL_HTTP_MAX_RETRY:-3}
  GDAL_HTTP_RETRY_DELAY: ${GDAL_HTTP_RETRY_DELAY:-1}
  GDAL_HTTP_TIMEOUT: ${GDAL_HTTP_TIMEOUT:-5}
  GDAL_HTTP_MERGE_CONSECUTIVE_RANGES: ${GDAL_HTTP_MERGE_CONSECUTIVE_RANGES:-YES}
  CPL_VSIL_CURL_CHUNK_SIZE: ${CPL_VSIL_CURL_CHUNK_SIZE:-1048576}
  GDAL_DISABLE_READDIR_ON_OPEN: ${GDAL_DISABLE_READDIR_ON_OPEN:-EMPTY_DIR}
  CPL_VSIL_USE_TEMP_FILE_FOR_RANDOM_WRITE: ${CPL_VSIL_USE_TEMP_FILE_FOR_RANDOM_WRITE:-NO}
  VSI_CACHE: ${VSI_CACHE:-TRUE}
  VSI_CACHE_SIZE: ${VSI_CACHE_SIZE:-134217728}
  PORT: "8080"                  # internal container port – never changes
  # STAC provider tried first: "planetary-computer" (default), "earth-search", "cdse"
  # On failure the remaining providers are raced automatically.
  STAC_PROVIDER: ${STAC_PROVIDER:-planetary-computer}
  # Scene search window: ±N days around the requested date (default 15)
  STAC_SEARCH_WINDOW_DAYS: ${STAC_SEARCH_WINDOW_DAYS:-15}
  # Maximum acceptable cloud cover percent 0–100 (default 20)
  STAC_MAX_CLOUD_COVER: ${STAC_MAX_CLOUD_COVER:-20}
  # CDSE S3 credentials — required only when STAC_PROVIDER=cdse
  # Generate at: https://eodata-s3keysmanager.dataspace.copernicus.eu/
  CDSE_S3_ACCESS_KEY: ${CDSE_S3_ACCESS_KEY:-}
  CDSE_S3_SECRET_KEY: ${CDSE_S3_SECRET_KEY:-}

services:
  # ── PostGIS ─────────────────────────────────────────────────────────────────
  postgis:
    image: postgis/postgis:15-3.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      # Store data in a subdirectory so .gitkeep at the mount root doesn't
      # interfere with initdb's "directory must be empty" check.
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${HOST_PORT_DB:-5432}:5432"  # change HOST_PORT_DB in .env to remap
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geouser -d geodb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO bucket initializer (runs once, connects to external minio) ─────────
  # MinIO itself lives in the separate minio-infra project.
  minio-init:
    image: minio/mc:latest
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-ndvi-tiles}
    entrypoint: >
      /bin/sh -c "
        until mc alias set local http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY; do
          echo 'Waiting for MinIO...'; sleep 3;
        done &&
        mc mb --ignore-existing local/$$MINIO_BUCKET &&
        mc anonymous set download local/$$MINIO_BUCKET
      "
    restart: "on-failure"
    networks:
      - shared-infra

  # ── Redis (shared L2 tile cache) ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --save ""
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Go service (scale with: docker compose up -d --scale gogeoapp=N) ────────
  gogeoapp:
    build: ./app
    restart: unless-stopped
    environment:
      <<: *app-env
    depends_on:
      postgis:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8080"
    networks:
      - default
      - shared-infra

  # ── Nginx load balancer ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "${HOST_PORT_HTTP:-80}:80"  # change HOST_PORT_HTTP in .env to remap
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gogeoapp

# ── Networks ────────────────────────────────────────────────────────────────
# shared-infra must be created once: docker network create shared-infra
# or via `make network` in the minio-infra project.
networks:
  shared-infra:
    external: true
    name: shared-infra

# Data is persisted in ./data/ — stop/start containers freely without data loss.
