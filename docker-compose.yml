# ─── Shared environment for all Go replicas ───────────────────────────────────
x-app-env: &app-env
  DB_HOST: postgis
  DB_PORT: "5432"               # internal container port – never changes
  DB_USER: ${DB_USER}
  DB_PASSWORD: ${DB_PASSWORD}
  DB_NAME: ${DB_NAME}
  S3_ENDPOINT: ${S3_ENDPOINT}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY}
  S3_SECRET_KEY: ${S3_SECRET_KEY}
  S3_BUCKET: ${S3_BUCKET}
  S3_USE_SSL: "false"
  # GDAL env vars – allow /vsicurl/ to use the network
  REDIS_URL: redis://redis:6379/0
  GDAL_HTTP_UNSAFESSL: ${GDAL_HTTP_UNSAFESSL:-YES}
  CPL_VSIL_CURL_ALLOWED_EXTENSIONS: ${CPL_VSIL_CURL_ALLOWED_EXTENSIONS:-.tif,.tiff,.jp2}
  GDAL_HTTP_MAX_RETRY: ${GDAL_HTTP_MAX_RETRY:-3}
  GDAL_HTTP_RETRY_DELAY: ${GDAL_HTTP_RETRY_DELAY:-1}
  GDAL_HTTP_TIMEOUT: ${GDAL_HTTP_TIMEOUT:-5}
  GDAL_HTTP_MERGE_CONSECUTIVE_RANGES: ${GDAL_HTTP_MERGE_CONSECUTIVE_RANGES:-YES}
  CPL_VSIL_CURL_CHUNK_SIZE: ${CPL_VSIL_CURL_CHUNK_SIZE:-1048576}
  GDAL_DISABLE_READDIR_ON_OPEN: ${GDAL_DISABLE_READDIR_ON_OPEN:-EMPTY_DIR}
  CPL_VSIL_USE_TEMP_FILE_FOR_RANDOM_WRITE: ${CPL_VSIL_USE_TEMP_FILE_FOR_RANDOM_WRITE:-NO}
  VSI_CACHE: ${VSI_CACHE:-TRUE}
  VSI_CACHE_SIZE: ${VSI_CACHE_SIZE:-134217728}
  PORT: "8080"                  # internal container port – never changes
  # STAC provider tried first: "planetary-computer" (default), "earth-search", "cdse"
  # On failure the remaining providers are raced automatically.
  STAC_PROVIDER: ${STAC_PROVIDER:-planetary-computer}
  # Scene search window: ±N days around the requested date (default 5)
  STAC_SEARCH_WINDOW_DAYS: ${STAC_SEARCH_WINDOW_DAYS:-5}
  # Maximum acceptable cloud cover percent 0–100 (default 20)
  STAC_MAX_CLOUD_COVER: ${STAC_MAX_CLOUD_COVER:-20}
  # CDSE S3 credentials — required only when STAC_PROVIDER=cdse
  # Generate at: https://eodata-s3keysmanager.dataspace.copernicus.eu/
  CDSE_S3_ACCESS_KEY: ${CDSE_S3_ACCESS_KEY:-}
  CDSE_S3_SECRET_KEY: ${CDSE_S3_SECRET_KEY:-}
  # Admin token for /api/admin/* endpoints
  ADMIN_TOKEN: ${ADMIN_TOKEN:-}

services:
  # ── PostGIS ─────────────────────────────────────────────────────────────────
  postgis:
    image: postgis/postgis:15-3.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      # Store data in a subdirectory so .gitkeep at the mount root doesn't
      # interfere with initdb's "directory must be empty" check.
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${HOST_PORT_DB:-5432}:5432"  # change HOST_PORT_DB in .env to remap
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geouser -d geodb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── S3 bucket initializer (runs once, connects to external SeaweedFS) ────────
  # Uses SeaweedFS's own `weed shell` (Apache-2.0, ships with the seaweedfs-infra
  # image) instead of MinIO's `mc` client — no S3 credentials needed, since
  # bucket creation goes through the master API directly, not the S3 gateway.
  s3-init:
    image: chrislusf/seaweedfs:latest
    entrypoint: /bin/sh
    environment:
      SEAWEED_MASTER: ${SEAWEED_MASTER:-seaweed:9333}
      S3_BUCKET: ${S3_BUCKET:-ndvi-tiles}
    command:
      - -c
      - >
        until echo "s3.bucket.create -name $$S3_BUCKET" | weed shell -master=$$SEAWEED_MASTER; do
          echo 'Waiting for SeaweedFS...'; sleep 3;
        done
    restart: "on-failure"
    networks:
      - ndvi-go-net

  # ── Redis (shared L2 tile cache) ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy volatile-lru --save ""
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Go service (scale with: docker compose up -d --scale gogeoapp=N) ────────
  gogeoapp:
    build: ./app
    restart: unless-stopped
    environment:
      <<: *app-env
    depends_on:
      postgis:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8080"
    labels:
      logging.service: "gogeoapp"
    networks:
      - default
      - ndvi-go-net
  # ── Nginx load balancer ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "${HOST_PORT_HTTP:-80}:80"  # change HOST_PORT_HTTP in .env to remap
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gogeoapp

networks:
  ndvi-go-net:
    external: true

# Data is persisted in ./data/ — stop/start containers freely without data loss.
