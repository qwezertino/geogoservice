worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Docker's embedded DNS server – required for dynamic service discovery
    # when replicas are added/removed via --scale.
    # valid=5s forces re-resolution every 5 seconds so new replicas are picked up.
    resolver 127.0.0.11 valid=5s ipv6=off;

    # Rate-limit zone: 60 req/s per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/s;

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy no-referrer always;

        location /api/ {
            limit_req zone=api_limit burst=120 nodelay;

            # Using a variable forces nginx to re-resolve 'gogeoapp' via Docker DNS
            # on every request (respecting the resolver TTL above).
            # Docker Compose round-robins across all scaled replicas automatically.
            set $upstream http://gogeoapp:8080;
            proxy_pass         $upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Tile responses can be cached downstream for 1 hour
            add_header Cache-Control "public, max-age=3600";

            proxy_read_timeout  120s;
            proxy_send_timeout  120s;
            proxy_connect_timeout 10s;
        }

        location /health {
            set $upstream http://gogeoapp:8080;
            proxy_pass $upstream;
        }
    }
}
